name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # ======================
      # 📦 Checkout
      # ======================
      - name: Checkout
        uses: actions/checkout@v4

      # ======================
      # 🐍 Python Setup
      # ======================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # ======================
      # 📦 Cache pip (accélère CI)
      # ======================
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

