name: CI

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout du repo
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # ✅ Installation outils
      - name: Install tools
        run: |
          pip install ruff black

      # ✅ Lint (tolérant)
      - name: Ruff check
        run: |
          ruff check . || true

      # ✅ Format (tolérant)
      - name: Black check
        run: |
          black --check . || true

      # ✅ Message final
      - name: Done
        run: echo "✅ CI terminé (mode tolérant)"
