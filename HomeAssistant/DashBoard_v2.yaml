title: SOLID EMS
views:
  - title: Energie
    path: energy
    icon: mdi:flash
    panel: true
    cards:
      - type: vertical-stack
        cards:
          - type: horizontal-stack
            cards:
              - type: vertical-stack
                cards:
                  - type: markdown
                    content: >
                      ## SOLID EMS

                      **PV** {{ states('sensor.solid_ems_solid_pv_power') }} kW
                      · **Maison** {{ states('sensor.solid_ems_solid_home_load')
                      }} kW  

                      **Batt.** {{ states('sensor.solid_ems_solid_battery_soc')
                      }} % · **Réseau** {{
                      states('sensor.solid_ems_solid_grid_power') }} kW
                  - type: grid
                    columns: 2
                    square: false
                    cards:
                      - type: custom:button-card
                        entity: sensor.solid_ems_solid_pv_power
                        name: PV
                        icon: mdi:solar-power
                        show_state: true
                        styles:
                          card:
                            - height: 50px
