version: "3.9"

services:
  solid-core:
    build: ./services/core
    container_name: solid-core
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mqtt

  mqtt:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
``
