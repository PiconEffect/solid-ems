version: "3.9"

services:
  solid-core:
    build: ./services/core
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - mqtt

  mqtt:
    image: eclipse-mosquitto:2
    restart: unless-stopped
    ports:
      - "1883:1883"

  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./ha-config:/config
